<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#C97A0F"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background, matches Header logo -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- Inner processor square -->
  <rect x="22" y="22" width="20" height="20" rx="3" fill="#FFFFFF" fill-opacity="0.95"/>
  <!-- Circuit lines (top/bottom/left/right) -->
  <rect x="31" y="6" width="2" height="14" fill="#FFFFFF"/>
  <rect x="31" y="44" width="2" height="14" fill="#FFFFFF"/>
  <rect x="6" y="31" width="14" height="2" fill="#FFFFFF"/>
  <rect x="44" y="31" width="14" height="2" fill="#FFFFFF"/>
  <!-- Corner connection dots -->
  <circle cx="14" cy="14" r="2" fill="#FFFFFF"/>
  <circle cx="50" cy="14" r="2" fill="#FFFFFF"/>
  <circle cx="14" cy="50" r="2" fill="#FFFFFF"/>
  <circle cx="50" cy="50" r="2" fill="#FFFFFF"/>
</svg>
